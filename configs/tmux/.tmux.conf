# Prefix: Ctrl+A. Send a literal Ctrl+A with Ctrl+A again.
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi
set -sg escape-time 10
set -g focus-events on
set -g set-clipboard on
set -as terminal-features ',xterm-ghostty:RGB'
set -as terminal-overrides ',*:Tc'

# Keep the working directory when splitting panes and creating windows.
bind c new-window -c '#{pane_current_path}'
bind '|' split-window -h -c '#{pane_current_path}'
bind '-' split-window -v -c '#{pane_current_path}'
bind r source-file ~/.tmux.conf \; display-message 'tmux config reloaded'

# Pane movement and resizing without an extra prefix once prefix is pressed.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

set -g status-position bottom
set -g status-interval 5
set -g status-style 'bg=#1e1e2e,fg=#cdd6f4'
set -g status-left '#[fg=#89b4fa,bold] #S #[default]'
set -g status-right '#[fg=#a6e3a1]#(whoami)@#H #[fg=#cdd6f4]%Y-%m-%d %H:%M '
setw -g window-status-current-format '#[bg=#89b4fa,fg=#1e1e2e,bold] #I:#W #[default]'
setw -g window-status-format '#[fg=#bac2de] #I:#W '
set -g pane-border-style 'fg=#45475a'
set -g pane-active-border-style 'fg=#89b4fa'
set -g message-style 'bg=#313244,fg=#cdd6f4'
